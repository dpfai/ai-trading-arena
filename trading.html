<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Arena — AI Trading Arena</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f1a; --card: #16213e; --text: #e0e0e0; --muted: #8892b0; --border: #233;
      --ai-analyst: #ff6b6b; --quant-ai: #4ecdc4; --dca: #a78bfa; --spy: #fbbf24;
      --profit: #4ecdc4; --loss: #ffa502;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .nav-link { color: var(--muted); transition: color .2s; }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--quant-ai); }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-buy { background: rgba(78,205,196,.15); color: var(--quant-ai); }
    .badge-sell { background: rgba(255,165,2,.15); color: var(--loss); }
    .badge-hold { background: rgba(136,146,176,.15); color: var(--muted); }
    .chart-container { position: relative; height: 400px; }
    @media (max-width: 768px) { .chart-container { height: 300px; } }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 8px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .filter-btn { padding: 4px 12px; border-radius: 6px; font-size: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .2s; }
    .filter-btn.active { background: var(--quant-ai); color: var(--bg); border-color: var(--quant-ai); }
    .filter-btn:hover { border-color: var(--quant-ai); }
  </style>
</head>
<body class="min-h-screen">
  <nav class="border-b border-[#233] sticky top-0 z-50 backdrop-blur-md bg-[#0f0f1a]/90">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="font-bold text-lg flex items-center gap-2"><span style="color: var(--quant-ai)">◆</span> AI Trading Arena</a>
      <div class="flex items-center gap-6 text-sm">
        <a href="/" class="nav-link">Home</a>
        <a href="/trading.html" class="nav-link active">Trading</a>
        <a href="/analysis.html" class="nav-link">Analysis</a>
        <a href="/method.html" class="nav-link">Method</a>
        <a href="https://github.com/dpfai/ai-trading-arena" target="_blank" class="nav-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">Trading Arena</h1>
    <p class="text-[var(--muted)] text-sm mb-8">All signals are recorded in real-time. No edits, no deletions. Fully transparent.</p>

    <!-- Detailed Equity Chart -->
    <div class="card p-6 mb-8">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">Equity Curve</h2>
        <div class="flex gap-2" id="rangeFilters">
          <button class="filter-btn active" data-range="all">All</button>
          <button class="filter-btn" data-range="7">7D</button>
          <button class="filter-btn" data-range="14">14D</button>
          <button class="filter-btn" data-range="30">30D</button>
        </div>
      </div>
      <div class="chart-container"><canvas id="equityChart"></canvas></div>
    </div>

    <!-- Current Holdings -->
    <div class="card p-6 mb-8">
      <h2 class="text-lg font-semibold mb-4">Current Holdings</h2>
      <div class="overflow-x-auto">
        <table id="holdingsTable">
          <thead>
            <tr>
              <th>Source</th><th>Ticker</th><th>Shares</th><th>Cost</th><th>Current</th><th>Value</th><th>P/L</th><th>Return</th>
            </tr>
          </thead>
          <tbody id="holdingsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- All Signals -->
    <div class="card p-6">
      <h2 class="text-lg font-semibold mb-4">All Trading Signals</h2>
      <div class="overflow-x-auto">
        <table id="signalsTable">
          <thead>
            <tr>
              <th>Date</th><th>Source</th><th>Action</th><th>Ticker</th><th>Price</th><th>Shares</th><th>Amount</th><th>Reason</th>
            </tr>
          </thead>
          <tbody id="signalsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="trading.js"></script>
</body>
</html>
